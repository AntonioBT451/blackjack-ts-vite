<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blackjack</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="src/css/styles.css">
</head>

<body>
  <header class="titulo mb-3">
    <h1>
      Blackjack
    </h1>
  </header>

  <nav aria-label="Controles del juego" class="mb-3">
    <div class="row mt-2">
      <div class="col text-center">
        <button class="btn btn-danger">Nuevo juego</button>
        <button class="btn btn-primary">Pedir carta</button>
        <button class="btn btn-primary">Detener</button>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">
      <div class="row">
        <div class="col">
          <section aria-labelledby="titulo-jugador">
            <h2 id="titulo-jugador" class="mb-4">Jugador 1 - 0</h2>

            <div id="cartas-jugador">
              <img src="src/assets/cartas/10C.png" alt="" class="carta">
              <img src="src/assets/cartas/10C.png" alt="" class="carta">
              <img src="src/assets/cartas/10C.png" alt="" class="carta">
            </div>
          </section>
        </div>

        <div class="col">
          <section aria-labelledby="titulo-computadora">
            <h2 id="titulo-computadora" class="mb-4">Computadora - 0</h2>

            <div id="cartas-computadora">
              <img src="src/assets/cartas/10C.png" alt="" class="carta">
              <img src="src/assets/cartas/10C.png" alt="" class="carta">
              <img src="src/assets/cartas/10C.png" alt="" class="carta">
            </div>
          </section>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
